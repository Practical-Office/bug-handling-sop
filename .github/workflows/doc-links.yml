name: doc-links

on:
  pull_request:
    paths:
      - "docs/**"
      - "scripts/check_doc_links.py"
      - "scripts/test_check_doc_links.py"
      - ".github/workflows/doc-links.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/check_doc_links.py"
      - "scripts/test_check_doc_links.py"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/test_check_doc_links.py
